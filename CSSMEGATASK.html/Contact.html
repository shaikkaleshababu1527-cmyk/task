     @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
      background: transparent;
    }

    .brand {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
    }

    .brand img {
      display: block;
      width: 120px;
      height: auto;
      filter: brightness(0) invert(1);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      flex: 1 1 auto;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.45em;
      font-size: 15.4px;
      font-weight: 500;
    }

    .nav a {
      color: rgba(255, 233, 226, 0.92);
      text-decoration: none;
    }

    .nav a:hover {
      text-decoration: underline;
      text-underline-offset: 6px;
      text-decoration-thickness: 2px;
    }

    .social {
      display: flex;
      align-items: center;
      gap: 18px;
      flex: 0 0 auto;
    }

    .social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: #f4d5e2;
      border-radius: 50%;
      text-decoration: none;
    }

    .social i {
      color: #000000 !important;
      font-size: 18px;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-img {
      position: absolute;
      top: 50%;
      left: 46%;
      transform: translate(-50%, -50%);
      width: 90vw;
      animation: fallDown 1.5s ease-out forwards;
    }

    .hero-graphic {
      position: absolute;
      left: 14px;
      bottom: 22px;
      z-index: 2;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      gap: 26px;
    }

    .hero-graphic-item {
      display: block;
      animation: fallDownGraphic 1.5s ease-out forwards;
    }

    .hero-graphic-float {
      display: block;
      animation: floatLoop 2.2s ease-in-out 1.5s infinite alternate;
    }

    .hero-graphic img {
      display: block;
    }

    .hero-graphic-right {
      position: absolute;
      right: 18px;
      top: 168px;
      z-index: 2;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 72px;
    }

    .hero-graphic-right .hero-graphic-item {
      align-self: flex-end;
    }

    .hero-graphic-one {
      width: 126px;
      align-self: flex-end;
    }

    .hero-graphic-two {
      width: 96px;
      margin-bottom: 10px;
      align-self: flex-end;
    }

    .hero-graphic-right-one {
      width: 94px;
    }

    .hero-graphic-right-two {
      width: 122px;
      margin-left: -12px;
    }

    @keyframes fallDown {
      0% {
        top: -200px;
        opacity: 0;
      }

      100% {
        top: 50%;
        transform: translate(-50%, -50%);
        opacity: 1;
      }
    }

    @keyframes fallDownGraphic {
      0% {
        transform: translateY(-220px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes floatLoop {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-10px);
      }
    }



    .fixed-panel {
      position: fixed;
      right: 0;
      bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      z-index: 999;
    }

    .fixed-box {
      background: #fff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      width: 180px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .fixed-box .num {
      font-size: 26px;
      font-weight: 700;
      color: #000;
    }

    .fixed-box .text {
      font-size: 12px;
      color: #555;
      line-height: 1.1;
    }

    .fixed-buy {
      background: #ff2d55;
      color: #fff;
      border: none;
      width: 180px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
    }

</style>
